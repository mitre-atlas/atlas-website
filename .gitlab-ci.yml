image: node:latest

variables:
  GIT_SUBMODULE_STRATEGY: normal

workflow:
  rules:
    # Create MR pipelines only when the MR targets develop
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'

    # Create normal branch pipelines only for pushes to develop
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"'

    # Do not create any other pipelines
    - when: never

default:
  before_script:
    # Install and cache dependencies
    - npm install --cache .npm --prefer-offline

.build_pages: &build_pages
  stage: deploy
  cache:
    key:
      files:
        - package-lock.json
      prefix: npm
    paths:
      - node_modules/
  script:
    # Append to the existing .env instead of overwriting it
    - |
      if [ "$CI_PIPELINE_SOURCE" = "merge_request_event" ]; then
        printf "\nVITE_BASE_URL=%s\n" "/$CI_PROJECT_NAME/mr-$CI_MERGE_REQUEST_IID/" >> .env
      else
        printf "\nVITE_BASE_URL=%s\n" "/$CI_PROJECT_NAME/" >> .env
      fi
    - cat .env
    - npm run build
    # fix for 404 on refresh issue
    - cp dist/index.html dist/404.html
  tags:
    - pages-no-cui

pages_develop:
  <<: *build_pages
  pages:
    publish: dist
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"'

pages_mr_preview:
  <<: *build_pages
  pages:
    publish: dist
    path_prefix: "mr-$CI_MERGE_REQUEST_IID"
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"'
